name: Testes Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: testes-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testes:
    name: Python 3.12 / Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Obter repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validar ambiente Python
        run: |
          python --version
          python -c "import pandas, requests, streamlit; print('ambiente-ok')"

      - name: Executar suíte completa
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest discover -s tests -p "test_*.py" -v
