name: Alertas automáticos de férias

on:
  schedule:
    # 11:00 UTC = 08:00 Brasil
    - cron: "0 11 * * *"

  # Permite execução manual pelo GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Executar alertas automáticos
        env:
          GITHUB_TOKEN: ${{ github.token }}

          REPO: ${{ secrets.REPO }}

          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USUARIO: ${{ secrets.EMAIL_USUARIO }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_ORIGEM: ${{ secrets.EMAIL_ORIGEM }}
          EMAIL_DESTINO_ALERTAS: ${{ secrets.EMAIL_DESTINO_ALERTAS }}

        run: python scripts/enviar_alertas_ferias.py
